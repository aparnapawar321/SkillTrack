spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/skilltrack}
    username: ${DATABASE_USERNAME:skilltrack}
    password: ${DATABASE_PASSWORD:skilltrack123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  cache:
    type: none  # Disable caching in dev mode for testing

logging:
  level:
    root: INFO
    com.example.skilltrack: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

app:
  email:
    enabled: false  # Disable emails in dev mode
