spring:
  datasource:
    url: jdbc:h2:mem:skilltrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        envers:
          autoRegisterListeners: false
  
  sql:
    init:
      mode: always
  
  cache:
    type: caffeine
  
  quartz:
    properties:
      org:
        quartz:
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate

app:
  email:
    enabled: true

management:
  health:
    redis:
      enabled: false

logging:
  level:
    root: INFO
    com.example.skilltrack: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
