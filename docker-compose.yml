version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skilltrack-postgres
    environment:
      POSTGRES_DB: skilltrack
      POSTGRES_USER: skilltrack
      POSTGRES_PASSWORD: skilltrack123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilltrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: skilltrack-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5052:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: skilltrack@gmail.com
      PGADMIN_DEFAULT_PASSWORD: root
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: skilltrack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
